# CulturePass Australia — Supabase local config
# Run `supabase start` to spin up the local stack, then `supabase db reset`
# to apply migrations + seed.

project_id = "culturepass-australia"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["culturepass://", "http://localhost:8081"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = true

# Anonymous sign-ins are OFF. If you later enable them, audit every RLS
# policy that relies on `TO authenticated` — anon users carry that role.
[auth.email.smtp]
# configure in production

[edge_runtime]
enabled = true
